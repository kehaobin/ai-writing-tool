<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI作文辅助系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            resize: vertical;
            font-family: inherit;
        }
        
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .event-textarea {
            height: 100px;
        }
        
        .essay-textarea {
            height: 250px;
            font-family: monospace;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: opacity 0.3s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .result-area {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            max-height: 500px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: none;
            color: #666;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .streaming-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background-color: #667eea;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .section-title {
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
            padding: 8px;
            background: #e8eaff;
            border-radius: 5px;
        }
        
        .error-message {
            color: red;
            padding: 10px;
            background: #ffe0e0;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .info-box {
            background: #e8eaff;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            color: #667eea;
            text-align: center;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 AI作文辅助系统</h1>
        
        <div class="main-grid">
            <!-- 左侧：作文信息输入 -->
            <div class="card">
                <h2>📌 作文信息输入</h2>
                <div class="input-group">
                    <label>事情/事件：</label>
                    <textarea id="event" class="event-textarea" placeholder="例如：第一次参加志愿者活动、帮助同学补习功课..."></textarea>
                </div>
                <div class="input-group">
                    <label>中心思想：</label>
                    <textarea id="center" class="event-textarea" placeholder="例如：奉献的快乐、助人为乐的重要性..."></textarea>
                </div>
                <div class="btn-group">
                    <button onclick="saveEvent()">💾 保存信息</button>
                    <button onclick="autoWrite()" id="autoWriteBtn">✨ 一键生成完整作文</button>
                </div>
                <div class="info-box">
                    💡 提示：填写事件和中心思想后，可一键生成大纲、素材和范文
                </div>
            </div>
            
            <!-- 右侧：手动输入作文 -->
            <div class="card">
                <h2>✏️ 手动输入作文</h2>
                <div class="input-group">
                    <label>粘贴或输入你的作文：</label>
                    <textarea id="userEssay" class="essay-textarea" placeholder="在这里粘贴或输入你的作文内容..."></textarea>
                </div>
                <div class="btn-group">
                    <button onclick="saveEssay()">💾 保存作文</button>
                    <button onclick="analyzeEssay()">🔍 分析作文</button>
                    <button onclick="rewriteEssay()">✍️ 改写作文</button>
                </div>
                <div class="info-box">
                    💡 提示：可以输入你的作文，AI会帮你分析、提取事件和中心思想，或按要求改写
                </div>
            </div>
        </div>
        
        <!-- 第二行：功能按钮 -->
        <div class="card full-width">
            <h2>🎯 作文辅助功能</h2>
            <div class="btn-group">
                <button onclick="generateOutline()">📋 生成大纲</button>
                <button onclick="searchMaterial()">📚 搜集素材</button>
                <button onclick="generateFanwen()">✍️ 生成范文</button>
                <button onclick="correctErrors()">🔍 检查错别字</button>
                <button onclick="polishArticle()">✨ 文章润色</button>
            </div>
        </div>
        
        <!-- 结果显示区域 -->
        <div class="card full-width">
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="outline">📋 大纲</button>
                <button class="tab-btn" data-tab="material">📚 素材</button>
                <button class="tab-btn" data-tab="fanwen">✍️ 范文</button>
                <button class="tab-btn" data-tab="correction">🔍 纠错结果</button>
                <button class="tab-btn" data-tab="polish">✨ 润色结果</button>
                <button class="tab-btn" data-tab="rewrite">🔄 改写结果</button>
                <button class="tab-btn" data-tab="analyze">📊 分析结果</button>
            </div>
            
            <div id="outline-tab" class="tab-content active">
                <div class="result-area" id="outline-result">等待生成大纲...</div>
            </div>
            <div id="material-tab" class="tab-content">
                <div class="result-area" id="material-result">等待搜集素材...</div>
            </div>
            <div id="fanwen-tab" class="tab-content">
                <div class="result-area" id="fanwen-result">等待生成范文...</div>
            </div>
            <div id="correction-tab" class="tab-content">
                <div class="result-area" id="correction-result">等待检查错别字...</div>
            </div>
            <div id="polish-tab" class="tab-content">
                <div class="result-area" id="polish-result">等待润色文章...</div>
            </div>
            <div id="rewrite-tab" class="tab-content">
                <div class="result-area" id="rewrite-result">等待改写作文...</div>
            </div>
            <div id="analyze-tab" class="tab-content">
                <div class="result-area" id="analyze-result">等待分析作文...</div>
            </div>
        </div>
    </div>
    
    <div id="status" class="status"></div>
    
    <script>
        let currentFanwen = '';
        let activeStream = null;
        
        function showStatus(msg, isError) {
            if (isError === undefined) isError = false;
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.style.backgroundColor = isError ? 'rgba(255,0,0,0.8)' : 'rgba(0,0,0,0.8)';
            statusDiv.style.display = 'block';
            setTimeout(function() {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            var tabBtns = document.querySelectorAll('.tab-btn');
            for (var i = 0; i < tabBtns.length; i++) {
                tabBtns[i].addEventListener('click', function() {
                    var tabName = this.getAttribute('data-tab');
                    switchTab(tabName);
                });
            }
        });
        
        function switchTab(tabName) {
            var tabBtns = document.querySelectorAll('.tab-btn');
            for (var i = 0; i < tabBtns.length; i++) {
                tabBtns[i].classList.remove('active');
                if (tabBtns[i].getAttribute('data-tab') === tabName) {
                    tabBtns[i].classList.add('active');
                }
            }
            
            var tabContents = document.querySelectorAll('.tab-content');
            for (var i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove('active');
            }
            var activeTab = document.getElementById(tabName + '-tab');
            if (activeTab) {
                activeTab.classList.add('active');
            }
        }
        
        async function saveEvent() {
            var event = document.getElementById('event').value;
            var center = document.getElementById('center').value;
            
            if (!event && !center) {
                showStatus('请填写事情或中心思想', true);
                return;
            }
            
            try {
                var response = await fetch('/api/save_event', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({event: event, center: center})
                });
                var data = await response.json();
                showStatus('保存成功！');
            } catch (error) {
                showStatus('保存失败：' + error.message, true);
            }
        }
        
        async function saveEssay() {
            var essay = document.getElementById('userEssay').value;
            
            if (!essay) {
                showStatus('请先输入作文内容', true);
                return;
            }
            
            try {
                var response = await fetch('/api/save_essay', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({essay: essay})
                });
                var data = await response.json();
                showStatus('作文已保存！');
            } catch (error) {
                showStatus('保存失败：' + error.message, true);
            }
        }
        
        async function analyzeEssay() {
            var essay = document.getElementById('userEssay').value;
            
            if (!essay) {
                showStatus('请先输入作文内容', true);
                return;
            }
            
            var resultArea = document.getElementById('analyze-result');
            resultArea.innerHTML = '<div style="color: #667eea;">🔍 正在分析作文...<div class="loading" style="margin-left: 10px; display: inline-block;"></div></div>';
            switchTab('analyze');
            
            try {
                var response = await fetch('/api/analyze_essay', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({essay: essay})
                });
                
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var content = '';
                
                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    
                    var chunk = decoder.decode(result.value);
                    var lines = chunk.split('\n');
                    
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('data: ')) {
                            var data = line.slice(6);
                            if (data === '[DONE]') break;
                            
                            try {
                                var json = JSON.parse(data);
                                if (json.content) {
                                    content += json.content;
                                    resultArea.innerHTML = content + '<span class="streaming-cursor"></span>';
                                    resultArea.scrollTop = resultArea.scrollHeight;
                                    
                                    // 尝试提取事件和中心思想并自动填入
                                    try {
                                        var jsonMatch = content.match(/\{[\s\S]*\}/);
                                        if (jsonMatch) {
                                            var parsed = JSON.parse(jsonMatch[0]);
                                            if (parsed.event && parsed.event !== "无") {
                                                document.getElementById('event').value = parsed.event;
                                            }
                                            if (parsed.center && parsed.center !== "无") {
                                                document.getElementById('center').value = parsed.center;
                                            }
                                        }
                                    } catch(e) {}
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                resultArea.innerHTML = content;
                showStatus('分析完成！已自动填入事件和中心思想');
            } catch (error) {
                resultArea.innerHTML = '<div class="error-message">错误: ' + error.message + '</div>';
                showStatus('分析失败: ' + error.message, true);
            }
        }
        
        async function rewriteEssay() {
            var essay = document.getElementById('userEssay').value;
            
            if (!essay) {
                showStatus('请先输入作文内容', true);
                return;
            }
            
            var requirement = prompt('请输入改写要求', '改进作文，使语言更优美、生动');
            if (!requirement) return;
            
            var resultArea = document.getElementById('rewrite-result');
            resultArea.innerHTML = '<div style="color: #667eea;">✍️ 正在改写作文...<div class="loading" style="margin-left: 10px; display: inline-block;"></div></div>';
            switchTab('rewrite');
            
            try {
                var response = await fetch('/api/rewrite_essay', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({essay: essay, requirement: requirement})
                });
                
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var content = '';
                
                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    
                    var chunk = decoder.decode(result.value);
                    var lines = chunk.split('\n');
                    
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('data: ')) {
                            var data = line.slice(6);
                            if (data === '[DONE]') break;
                            
                            try {
                                var json = JSON.parse(data);
                                if (json.content) {
                                    content += json.content;
                                    resultArea.innerHTML = content + '<span class="streaming-cursor"></span>';
                                    resultArea.scrollTop = resultArea.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                resultArea.innerHTML = content;
                showStatus('改写完成！');
            } catch (error) {
                resultArea.innerHTML = '<div class="error-message">错误: ' + error.message + '</div>';
                showStatus('改写失败: ' + error.message, true);
            }
        }
        
        async function streamFetch(url, targetElement) {
            if (activeStream) {
                activeStream = null;
            }
            
            targetElement.innerHTML = '';
            var content = '';
            
            try {
                var response = await fetch(url);
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                
                activeStream = true;
                
                while (activeStream) {
                    var result = await reader.read();
                    if (result.done) break;
                    
                    var chunk = decoder.decode(result.value);
                    var lines = chunk.split('\n');
                    
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('data: ')) {
                            var data = line.slice(6);
                            if (data === '[DONE]') {
                                activeStream = false;
                                break;
                            }
                            
                            try {
                                var json = JSON.parse(data);
                                if (json.content) {
                                    content += json.content;
                                    targetElement.innerHTML = content + '<span class="streaming-cursor"></span>';
                                    targetElement.scrollTop = targetElement.scrollHeight;
                                } else if (json.error) {
                                    targetElement.innerHTML = '<div class="error-message">错误: ' + json.error + '</div>';
                                    showStatus('生成失败: ' + json.error, true);
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                targetElement.innerHTML = content;
                return content;
            } catch (error) {
                targetElement.innerHTML = '<div class="error-message">错误: ' + error.message + '</div>';
                showStatus('生成失败: ' + error.message, true);
                return '';
            } finally {
                activeStream = false;
            }
        }
        
        async function generateOutline() {
            var resultArea = document.getElementById('outline-result');
            resultArea.innerHTML = '<div style="color: #667eea;">📝 正在生成大纲...<div class="loading" style="margin-left: 10px; display: inline-block;"></div></div>';
            switchTab('outline');
            await streamFetch('/api/outline', resultArea);
            showStatus('大纲生成完成！');
        }
        
        async function searchMaterial() {
            var resultArea = document.getElementById('material-result');
            resultArea.innerHTML = '<div style="color: #667eea;">📚 正在搜集素材...<div class="loading" style="margin-left: 10px; display: inline-block;"></div></div>';
            switchTab('material');
            await streamFetch('/api/material', resultArea);
            showStatus('素材搜集完成！');
        }
        
        async function generateFanwen() {
            var resultArea = document.getElementById('fanwen-result');
            resultArea.innerHTML = '<div style="color: #667eea;">✍️ 正在生成范文...<div class="loading" style="margin-left: 10px; display: inline-block;"></div></div>';
            switchTab('fanwen');
            var content = await streamFetch('/api/fanwen', resultArea);
            if (content) {
                currentFanwen = content;
            }
            showStatus('范文生成完成！');
        }
        
        async function correctErrors() {
            if (!currentFanwen) {
                var fanwenArea = document.getElementById('fanwen-result');
                if (fanwenArea.innerText && !fanwenArea.innerText.includes('正在生成') && !fanwenArea.innerText.includes('等待生成')) {
                    currentFanwen = fanwenArea.innerText;
                } else {
                    showStatus('请先生成范文', true);
                    return;
                }
            }
            
            var resultArea = document.getElementById('correction-result');
            resultArea.innerHTML = '<div style="color: #667eea;">🔍 正在检查错别字...<div class="loading" style="margin-left: 10px; display: inline-block;"></div></div>';
            switchTab('correction');
            
            try {
                var response = await fetch('/api/correct_errors', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: currentFanwen})
                });
                
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var content = '';
                
                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    
                    var chunk = decoder.decode(result.value);
                    var lines = chunk.split('\n');
                    
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('data: ')) {
                            var data = line.slice(6);
                            if (data === '[DONE]') break;
                            
                            try {
                                var json = JSON.parse(data);
                                if (json.content) {
                                    content += json.content;
                                    resultArea.innerHTML = content + '<span class="streaming-cursor"></span>';
                                    resultArea.scrollTop = resultArea.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                resultArea.innerHTML = content;
                showStatus('检查完成！');
            } catch (error) {
                resultArea.innerHTML = '<div class="error-message">错误: ' + error.message + '</div>';
                showStatus('检查失败: ' + error.message, true);
            }
        }
        
        async function polishArticle() {
            if (!currentFanwen) {
                var fanwenArea = document.getElementById('fanwen-result');
                if (fanwenArea.innerText && !fanwenArea.innerText.includes('正在生成') && !fanwenArea.innerText.includes('等待生成')) {
                    currentFanwen = fanwenArea.innerText;
                } else {
                    showStatus('请先生成范文', true);
                    return;
                }
            }
            
            var resultArea = document.getElementById('polish-result');
            resultArea.innerHTML = '<div style="color: #667eea;">✨ 正在润色文章...<div class="loading" style="margin-left: 10px; display: inline-block;"></div></div>';
            switchTab('polish');
            
            try {
                var response = await fetch('/api/polish', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: currentFanwen})
                });
                
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var content = '';
                
                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    
                    var chunk = decoder.decode(result.value);
                    var lines = chunk.split('\n');
                    
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('data: ')) {
                            var data = line.slice(6);
                            if (data === '[DONE]') break;
                            
                            try {
                                var json = JSON.parse(data);
                                if (json.content) {
                                    content += json.content;
                                    resultArea.innerHTML = content + '<span class="streaming-cursor"></span>';
                                    resultArea.scrollTop = resultArea.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                resultArea.innerHTML = content;
                showStatus('润色完成！');
            } catch (error) {
                resultArea.innerHTML = '<div class="error-message">错误: ' + error.message + '</div>';
                showStatus('润色失败: ' + error.message, true);
            }
        }
        
        async function autoWrite() {
            var btn = document.getElementById('autoWriteBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';
            
            var outlineArea = document.getElementById('outline-result');
            var materialArea = document.getElementById('material-result');
            var fanwenArea = document.getElementById('fanwen-result');
            
            outlineArea.innerHTML = '';
            materialArea.innerHTML = '';
            fanwenArea.innerHTML = '';
            
            var outlineContent = '';
            var materialContent = '';
            var fanwenContent = '';
            
            try {
                var response = await fetch('/api/auto_write');
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                
                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    
                    var chunk = decoder.decode(result.value);
                    var lines = chunk.split('\n');
                    
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('data: ')) {
                            var data = line.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                var json = JSON.parse(data);
                                
                                if (json.type === 'section') {
                                    // 章节标题
                                } else if (json.type === 'outline') {
                                    outlineContent += json.content;
                                    outlineArea.innerHTML = '<div class="section-title">📝 大纲</div>' + outlineContent + '<span class="streaming-cursor"></span>';
                                    outlineArea.scrollTop = outlineArea.scrollHeight;
                                    switchTab('outline');
                                } else if (json.type === 'material') {
                                    materialContent += json.content;
                                    materialArea.innerHTML = '<div class="section-title">📚 素材</div>' + materialContent + '<span class="streaming-cursor"></span>';
                                    materialArea.scrollTop = materialArea.scrollHeight;
                                    switchTab('material');
                                } else if (json.type === 'fanwen') {
                                    fanwenContent += json.content;
                                    fanwenArea.innerHTML = '<div class="section-title">✍️ 范文</div>' + fanwenContent + '<span class="streaming-cursor"></span>';
                                    fanwenArea.scrollTop = fanwenArea.scrollHeight;
                                    currentFanwen = fanwenContent;
                                    switchTab('fanwen');
                                } else if (json.type === 'complete') {
                                    showStatus(json.message);
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                outlineArea.innerHTML = outlineArea.innerHTML.replace('<span class="streaming-cursor"></span>', '');
                materialArea.innerHTML = materialArea.innerHTML.replace('<span class="streaming-cursor"></span>', '');
                fanwenArea.innerHTML = fanwenArea.innerHTML.replace('<span class="streaming-cursor"></span>', '');
                
                showStatus('✅ 作文生成完成！');
            } catch (error) {
                showStatus('生成失败：' + error.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ 一键生成完整作文';
            }
        }
    </script>
</body>
</html>
